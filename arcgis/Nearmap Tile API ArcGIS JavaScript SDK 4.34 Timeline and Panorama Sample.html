<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <!--
 ArcGIS Maps SDK for JavaScript, https://js.arcgis.com
 Learn more about Nearmap Tile API here: https://docs.nearmap.com/display/ND/Tile+API
 Learn more about Nearmap Coverage API here: https://docs.nearmap.com/display/ND/Coverage+API

 This sample shows Nearmap vertical and panorama (oblique) imagery across multiple
 survey dates:
  - A TimeSlider widget lists the survey dates available for the current view, fetched
    from the Coverage API. Picking a date reloads the tiles with the `until` parameter.
  - Direction buttons switch between Vert, North, East, South and West imagery. Oblique
    tiles are served as non-square images (256x192 or 192x256) oriented towards the
    viewing direction, which the standard WebTileLayer cannot display. A custom
    BaseTileLayer rotates and stretches each tile onto a square 256x256 canvas, and the
    view is rotated to match the heading.

 Limitations:
  - Oblique imagery is stretched 4/3 along the look direction compared to Nearmap's
    native viewer. ArcGIS LODs use a single resolution per level, so the non-square
    oblique tile grid cannot be represented exactly.
  - 2D MapView only; SceneView does not support view rotation.
 -->
    <title>Nearmap/ArcGIS Maps SDK for JavaScript Timeline and Panorama Sample</title>
    <style>
        html,
        body,
        #viewDiv {
            padding: 0;
            margin: 0;
            height: 100%;
            width: 100%;
        }

        #timeSliderDiv {
            width: 600px;
            max-width: 80vw;
        }

        #directionDiv {
            background: #ffffff;
            padding: 6px;
            text-align: center;
        }

        #directionDiv button {
            margin: 3px;
            padding: 4px 10px;
            cursor: pointer;
        }

        #directionDiv button.active {
            background: #0079c1;
            color: #ffffff;
        }
    </style>
    <link rel="stylesheet" href="https://js.arcgis.com/4.34/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.34/"></script>
    <script>
        require([
            "esri/Map",
            "esri/views/MapView",
            "esri/layers/BaseTileLayer",
            "esri/layers/support/TileInfo",
            "esri/layers/support/LOD",
            "esri/geometry/Point",
            "esri/geometry/SpatialReference",
            "esri/geometry/support/webMercatorUtils",
            "esri/widgets/TimeSlider",
            "esri/core/reactiveUtils"
        ], function(Map, MapView, BaseTileLayer, TileInfo, LOD, Point, SpatialReference, webMercatorUtils, TimeSlider, reactiveUtils) {

            //////////////////////
            // User Input Parameters
            ////////////////////
            const api_key = "";  // "NEARMAP_API_KEY_GOES_HERE"
            const origin = [-97.75, 30.269135];  // [Lon, Lat] for Location: ex: Austin, TX
            const origin_zoom = 17;  // Starting Zoom level for the Web Map
            const nearmap_min_zoom = 12;  // Nearmap Imagery Lowest resolution zoom level the user can view
            const nearmap_max_zoom = 24;  // Nearmap Imagery Highest resolution zoom level the user can view
            const coverage_since = "";  // Earliest survey date to show, e.g. "2020-01-01". Empty for no limit.
            const coverage_until = "";  // Latest survey date to show, e.g. "2024-12-31". Empty for today.
            const opacity = 1.0; // Range of 0.1 to 1.0
            const blend_mode = null; // See available blend modes here: https://doc.arcgis.com/en/arcgis-online/create-maps/use-blend-modes-mv.htm

            ///////////
            // Script
            /////////

            if (!api_key) {
                alert("API key is not set, please update the code to use your API key.");
                debugger; //remove this line in production
            }

            // Imagery heading in degrees for each direction. Oblique tile images are
            // oriented towards the viewing direction and need rotating by this angle
            // to become north-up.
            const HEADINGS = {
                Vert: 0,
                North: 0,
                East: 90,
                South: 180,
                West: 270
            };

            // Normalise the coverage window the same way the OpenLayers sample does:
            // until defaults to today, since defaults to well before the first survey.
            let since;
            try { since = new Date(coverage_since).toISOString().slice(0, 10); }
            catch { since = "2001-01-01"; }
            let until;
            try { until = new Date(coverage_until).toISOString().slice(0, 10); }
            catch { until = new Date().toISOString().slice(0, 10); }

            // By default ArcGIS SDK only goes to zoom level 19,
            // In order to overcome this, we need to add more Level Of Detail (LOD) entries to both the view and the tile layer
            // Taken from https://gist.github.com/stdavis/6e5c721d50401ddbf126
            let lods = [];
            const tilesize = 256;
            const earthCircumference = 40075016.685568;
            const inchesPerMeter = 39.37;
            const initialResolution = earthCircumference / tilesize;
            for (let zoom = nearmap_min_zoom; zoom <= nearmap_max_zoom; zoom++) {
                let resolution = initialResolution / Math.pow(2, zoom);
                let scale = resolution * 96 * inchesPerMeter;
                lods.push(new LOD({
                    level: zoom,
                    scale: scale,
                    resolution: resolution
                }));
            }

            const tileInfo = new TileInfo({
                dpi: 72,
                format: "jpg",
                lods: lods,
                origin: new Point({
                    x: -20037508.342787,
                    y: 20037508.342787
                }),
                spatialReference: SpatialReference.WebMercator,
                size: [256, 256]
            });

            // Custom tile layer for Nearmap vertical and oblique imagery.
            //
            // Nearmap oblique tile indices align exactly with the Web Mercator XYZ grid;
            // only the tile pixel aspect (256x192 for North/South, 192x256 for East/West)
            // and the image orientation differ. Each oblique tile is composited onto a
            // square 256x256 canvas with a single rotate-and-stretch transform, making it
            // a valid north-up Web Mercator tile.
            const NearmapTileLayer = BaseTileLayer.createSubclass({
                properties: {
                    apiKey: null,
                    direction: "Vert",
                    until: null
                },

                getTileUrl: function(level, row, col) {
                    let untilParam = "";
                    if (this.until) {
                        untilParam = "&until=" + this.until;
                    }

                    return "https://api.nearmap.com/tiles/v3/" +
                        this.direction + "/" + level + "/" + col + "/" + row +
                        ".img?tertiary=satellite&apikey=" + this.apiKey + untilParam;
                },

                fetchTile: function(level, row, col, options) {
                    const url = this.getTileUrl(level, row, col);
                    const heading = HEADINGS[this.direction];

                    // Nearmap returns a redirect when there is no imagery for a tile;
                    // with redirect: "manual" that comes back as a non-200 response and
                    // we render an empty tile instead.
                    return fetch(url, { redirect: "manual", signal: options && options.signal })
                        .then(function(response) {
                            return response.status === 200 ? response.blob() : null;
                        })
                        .then(function(blob) {
                            return blob ? createImageBitmap(blob) : null;
                        })
                        .then(function(bitmap) {
                            const canvas = document.createElement("canvas");
                            canvas.width = tilesize;
                            canvas.height = tilesize;

                            if (bitmap) {
                                const ctx = canvas.getContext("2d");
                                ctx.translate(tilesize / 2, tilesize / 2);
                                ctx.rotate(heading * (Math.PI / 180));
                                // Drawing the non-square bitmap into the full square in the
                                // rotated frame applies both the orientation fix and the
                                // 4/3 stretch in one transform.
                                ctx.drawImage(bitmap, -tilesize / 2, -tilesize / 2, tilesize, tilesize);
                            }

                            return canvas;
                        });
                }
            });

            const nearmapLayer = new NearmapTileLayer({
                apiKey: api_key,
                copyright: "Nearmap",
                tileInfo: tileInfo,
                opacity: opacity,
                blendMode: blend_mode
            });

            const map = new Map({
                layers: [nearmapLayer]
            });

            const view = new MapView({
                container: "viewDiv",
                map: map,
                // With custom LODs starting at nearmap_min_zoom the view treats zoom as
                // an index into the LOD array, hence the subtraction
                zoom: origin_zoom - nearmap_min_zoom,
                center: origin,
                constraints: {
                    // The LOD list bounds the zoom range to nearmap_min_zoom..nearmap_max_zoom
                    lods: lods
                }
            });

            //////////////////////
            // Timeline (survey dates)
            ////////////////////

            // The TimeSlider is intentionally not bound to the view (no `view` property):
            // the Nearmap layer is not time-aware, we drive it manually from timeExtent.
            const timeSlider = new TimeSlider({
                container: "timeSliderDiv",
                mode: "instant",
                timeVisible: false,
                playRate: 1500,
                loop: false,
                disabled: true
            });
            view.ui.add("timeSliderDiv", "bottom-leading");

            let availableSurveys = [];
            let selectedSurvey = null;   // date string the user picked, kept across map moves
            let displayedSurvey = null;  // date string currently shown on the map
            let suppressTimeEvent = false;
            let coverageRequestId = 0;

            function toDateString(date) {
                return date.toISOString().slice(0, 10);
            }

            /**
             * Documentation for this Nearmap API:
             * https://docs.nearmap.com/display/ND/Coverage+API
             */
            function coverageUrlTemplate(east, west, north, south) {
                return "https://api.nearmap.com/coverage/v2/poly/" +
                    west + "," + north + "," +
                    east + "," + north + "," +
                    east + "," + south + "," +
                    west + "," + south + "," +
                    west + "," + north +
                    "?apikey=" + api_key +
                    "&since=" + since +
                    "&until=" + until +
                    "&limit=1000";
            }

            /**
             * Extracts out surveys which contain the current direction's tile type.
             */
            function getAvailableSurveyDates(response) {
                let surveys = response && response.surveys ? response.surveys : [];

                return surveys.filter(function(survey) {
                    return (survey.resources.tiles || [])
                        .some(function(tile) { return tile.type === nearmapLayer.direction; });
                });
            }

            /**
             * Called when the selected survey date does not exist in the current list of
             * available survey dates. It returns the closest available date.
             */
            function findClosestDate(surveys, selectedDate) {
                let selectedDateInMs = selectedDate ? +new Date(selectedDate) : +new Date();
                let deltaInMs = surveys.map(function(survey) {
                    let surveyDateInMs = +new Date(survey.captureDate);
                    return Math.abs(selectedDateInMs - surveyDateInMs);
                });

                let closestDateInMs = Math.min.apply(null, deltaInMs);
                return surveys[deltaInMs.findIndex(function(ms) { return ms === closestDateInMs; })].captureDate;
            }

            function getSurveyDate(surveys, selectedDate) {
                // No dates available
                if (surveys.length === 0) {
                    return null;
                }

                // Selects the selected survey date when available
                if (surveys.find(function(survey) { return selectedDate === survey.captureDate; })) {
                    return selectedDate;
                }

                // Searches for the closest available survey date when not available
                return findClosestDate(surveys, selectedDate);
            }

            /**
             * Rebuilds the TimeSlider stops from the available surveys and selects
             * the displayed survey, without re-triggering the timeExtent watcher.
             */
            function updateTimeSlider() {
                suppressTimeEvent = true;

                if (availableSurveys.length === 0) {
                    timeSlider.disabled = true;
                    suppressTimeEvent = false;
                    return;
                }

                const dates = availableSurveys
                    .map(function(survey) { return new Date(survey.captureDate); })
                    .sort(function(a, b) { return a - b; });

                timeSlider.disabled = false;
                timeSlider.fullTimeExtent = {
                    start: dates[0],
                    end: dates[dates.length - 1]
                };
                timeSlider.stops = { dates: dates };

                const displayedDate = new Date(displayedSurvey);
                timeSlider.timeExtent = {
                    start: displayedDate,
                    end: displayedDate
                };

                suppressTimeEvent = false;
            }

            /**
             * Fetches the Coverage API for the current view extent and refreshes the
             * available surveys, the TimeSlider and (when needed) the map tiles.
             */
            function updateSurveys() {
                const requestId = ++coverageRequestId;
                const extent = webMercatorUtils.webMercatorToGeographic(view.extent);
                const coverageUrl = coverageUrlTemplate(extent.xmax, extent.xmin, extent.ymax, extent.ymin);

                return fetch(coverageUrl)
                    .then(function(response) { return response.json(); })
                    .then(function(response) {
                        // A newer request has been issued while this one was in flight
                        if (requestId !== coverageRequestId) {
                            return;
                        }

                        availableSurveys = getAvailableSurveyDates(response);

                        const previousDisplayed = displayedSurvey;
                        displayedSurvey = getSurveyDate(availableSurveys, selectedSurvey);
                        updateTimeSlider();

                        if (displayedSurvey !== previousDisplayed) {
                            nearmapLayer.until = displayedSurvey;
                            nearmapLayer.refresh();
                        }
                    })
                    .catch(function() {
                        // Ignore network errors; the next map move retries
                    });
            }

            // User picked a date on the TimeSlider
            reactiveUtils.watch(
                function() { return timeSlider.timeExtent; },
                function(timeExtent) {
                    if (suppressTimeEvent || !timeExtent || !timeExtent.start) {
                        return;
                    }

                    selectedSurvey = toDateString(timeExtent.start);
                    displayedSurvey = selectedSurvey;
                    nearmapLayer.until = displayedSurvey;
                    nearmapLayer.refresh();
                }
            );

            // Refresh the available surveys whenever the map stops moving
            reactiveUtils.watch(
                function() { return view.stationary; },
                function(stationary) {
                    if (stationary) {
                        updateSurveys();
                    }
                }
            );

            //////////////////////
            // Panorama direction buttons
            ////////////////////

            const directionDiv = document.getElementById("directionDiv");
            view.ui.add(directionDiv, "top-right");

            directionDiv.querySelectorAll("button").forEach(function(button) {
                button.addEventListener("click", function(evt) {
                    const direction = evt.target.value;
                    if (direction === nearmapLayer.direction) {
                        return;
                    }

                    directionDiv.querySelectorAll("button").forEach(function(b) {
                        b.classList.toggle("active", b === evt.target);
                    });

                    nearmapLayer.direction = direction;
                    // Rotate the view so the imagery reads naturally (e.g. South imagery
                    // is shown south-up)
                    view.rotation = (360 - HEADINGS[direction]) % 360;

                    // Survey availability differs per direction; refresh the tiles once
                    // the new survey list is known
                    updateSurveys().then(function() {
                        nearmapLayer.refresh();
                    });
                });
            });

            view.when(function() {
                updateSurveys();
            });
        });
    </script>
</head>

<body>
<div id="viewDiv"></div>
<div id="directionDiv">
    <div><button value="North">North</button></div>
    <div>
        <button value="West">West</button>
        <button value="Vert" class="active">Vertical</button>
        <button value="East">East</button>
    </div>
    <div><button value="South">South</button></div>
</div>
<div id="timeSliderDiv"></div>
</body>

</html>
